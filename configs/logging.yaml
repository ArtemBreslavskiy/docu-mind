default:
  filename_pattern: "%Y%m%d_%H%M%S.log"
  fmt: "[%(asctime)s.%(msecs)03d] - %(module)10s:%(lineno)-3d %(levelname)-7s - %(message)s"
  datefmt: "%Y-%m-%d %H:%M:%S"
  encoding: "utf-8"

  console:
    enable: true
    level: "INFO"
    use_colors: true

  file:
    enable: true
    level: "DEBUG"
    max_bytes: 10485760
    backup_count: 5

types:
  agent:
    name: "agent_logger"
    filename_pattern: "train_%Y%m%d_%H%M%S.log"
    console:
      level: "INFO"
    file:
      level: "DEBUG"

  pipeline:
    name: "pipeline_logger"
    filename_pattern: "train_%Y%m%d_%H%M%S.log"
    console:
      level: "INFO"
    file:
      level: "DEBUG"
